<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* 'unsafe-inline' 'unsafe-eval' data:; img-src 'self' data: http: https:">
<title>Sisyphus Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050810;--panel:#0B0F1C;--header:#080B14;--border:#1A2540;
  --cyan:#00E5FF;--green:#10F090;--red:#FF3366;--amber:#F59E0B;
  --purple:#A78BFA;--text:#C9D4E8;--dim:#2A3550;--muted:#4B5A7A;
  --font:'JetBrains Mono',ui-monospace,SFMono-Regular,monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--panel)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.layout{display:flex;height:100vh}
.sidebar{width:240px;flex-shrink:0;background:var(--header);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width 0.2s;overflow:hidden;position:relative}
.sidebar.collapsed{width:28px}
.sidebar.collapsed .sidebar-header,.sidebar.collapsed .token-setup,.sidebar.collapsed .repo-list,.sidebar.collapsed .sidebar-footer{display:none}
.sidebar-collapse-strip{display:none;align-items:center;justify-content:center;height:100%;width:28px;flex-direction:column}
.sidebar.collapsed .sidebar-collapse-strip{display:flex}
.sidebar-toggle-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:4px;line-height:1}
.sidebar-toggle-btn:hover{color:var(--purple)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}

.sidebar-header{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-title{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sidebar-title .dot{width:6px;height:6px;border-radius:50%;background:var(--purple);box-shadow:0 0 6px var(--purple)}
.sidebar-title span{font-size:9px;letter-spacing:.2em;color:var(--purple);text-transform:uppercase;flex:1}
.sidebar-title .refresh-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0 2px}
.sidebar-title .refresh-btn:hover{color:var(--cyan)}
.search{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;padding:5px 8px;outline:none;font-family:var(--font)}
.search:focus{border-color:rgba(161,139,250,.35)}
.search::placeholder{color:var(--dim)}

.token-setup{padding:12px;display:flex;flex-direction:column;gap:8px}
.token-setup-title{font-size:9px;color:var(--amber);letter-spacing:.15em;display:flex;align-items:center;gap:5px}
.token-setup-desc{font-size:9px;color:var(--muted);line-height:1.5}
.token-setup-desc a{color:var(--cyan);text-decoration:none}
.token-input{width:100%;background:var(--panel);border:1px solid rgba(245,158,11,.3);border-radius:4px;color:var(--text);font-size:10px;padding:6px 8px;outline:none;font-family:var(--font)}
.token-input:focus{border-color:rgba(245,158,11,.6)}
.token-save-btn{width:100%;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--amber);font-size:10px;padding:6px;border-radius:4px;cursor:pointer;font-family:var(--font);letter-spacing:.05em;transition:background .15s}
.token-save-btn:hover{background:rgba(245,158,11,.2)}
.token-save-btn:disabled{opacity:.4;cursor:not-allowed}

.repo-list{flex:1;overflow-y:auto}

.skel-item{padding:7px 12px;border-bottom:1px solid rgba(26,37,64,.3)}
.skel-line{height:8px;border-radius:3px;background:var(--dim);margin-bottom:4px;position:relative;overflow:hidden}
.skel-line::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0,rgba(255,255,255,.04) 50%,transparent 100%);animation:shimmer 1.4s infinite}
.skel-line.short{width:55%}
.skel-line.tiny{width:35%;height:6px}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

.repo-item{padding:7px 12px;border-bottom:1px solid rgba(26,37,64,.3);cursor:pointer;border-left:2px solid transparent;transition:all .1s;position:relative}
.repo-item:hover{background:var(--panel)}
.repo-item.in-panel{background:rgba(161,139,250,.04);border-left-color:var(--purple)}
.repo-item-top{display:flex;align-items:center;gap:5px;min-width:0}
.repo-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.repo-item.in-panel .repo-name{color:var(--purple)}
.repo-private{font-size:7px;color:var(--muted);border:1px solid var(--border);padding:1px 4px;border-radius:2px;flex-shrink:0;letter-spacing:.05em}
.repo-item-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.repo-lang{font-size:8px;color:var(--dim);display:flex;align-items:center;gap:3px}
.repo-stars{font-size:8px;color:var(--dim)}
.repo-time{font-size:8px;color:var(--dim)}
.repo-cloned-badge{font-size:7px;color:var(--green);border:1px solid rgba(16,240,144,.2);padding:1px 4px;border-radius:2px;letter-spacing:.05em}

.clone-overlay{position:absolute;inset:0;background:rgba(5,8,16,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;z-index:5}
.clone-bar-wrap{width:80%;background:var(--dim);border-radius:2px;height:3px;overflow:hidden}
.clone-bar{height:100%;background:var(--cyan);transition:width .3s;border-radius:2px}
.clone-msg{font-size:8px;color:var(--muted);text-align:center;padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}

.dev-progress{margin-top:5px}
.dev-progress-track{height:2px;background:rgba(42,53,80,.6);border-radius:2px;overflow:hidden}
.dev-progress-fill{height:100%;border-radius:2px;transition:width .4s ease}
.dev-progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.dev-progress-pct{font-size:8px;font-weight:600;letter-spacing:.04em}
.dev-progress-tag{font-size:7px;color:var(--muted);letter-spacing:.05em}
.dev-status-label{font-size:7px;letter-spacing:.08em;margin-top:3px;padding:1px 5px;border-radius:2px;display:inline-block;border:1px solid currentColor;opacity:.8}

.sidebar-footer{padding:6px 12px;border-top:1px solid var(--border);font-size:9px;color:var(--dim);display:flex;justify-content:space-between;flex-shrink:0}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;border-bottom:1px solid var(--border);background:var(--header);flex-shrink:0}
.brand{display:flex;align-items:center;gap:8px}
.brand h1{font-family:system-ui,sans-serif;font-size:14px;font-weight:800;color:#E8EEFF;letter-spacing:.06em}
.brand .badge{font-size:8px;letter-spacing:.2em;color:rgba(161,139,250,.7);border:1px solid rgba(161,139,250,.2);padding:2px 6px;border-radius:3px}
.status-indicator{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--dim)}
.status-indicator .live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green)}
.top-right{display:flex;align-items:center;gap:12px;font-size:9px;color:var(--dim)}
.clock{font-variant-numeric:tabular-nums}
.top-btn{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);color:var(--cyan);font-size:9px;padding:3px 10px;border-radius:4px;cursor:pointer;font-family:var(--font);letter-spacing:.08em;transition:background .15s}
.top-btn:hover{background:rgba(0,229,255,.18)}
.top-btn.purple{background:rgba(161,139,250,.07);border-color:rgba(161,139,250,.2);color:var(--purple)}
.top-btn.purple:hover{background:rgba(161,139,250,.18)}

.assign-bar{padding:5px 16px;background:rgba(245,158,11,.05);border-bottom:1px solid rgba(245,158,11,.15);display:none;align-items:center;gap:8px;font-size:10px;color:var(--amber);flex-shrink:0}
.assign-bar.show{display:flex}
.assign-bar .cancel{margin-left:auto;color:var(--muted);cursor:pointer;font-size:9px}
.assign-bar .cancel:hover{color:var(--amber)}

.panels{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;padding:6px;overflow:hidden}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;overflow:hidden;position:relative;transition:border-color .2s}
.panel.active{border-color:rgba(161,139,250,.25)}
.panel-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;background:var(--header);border-bottom:1px solid var(--border);flex-shrink:0;min-height:28px}
.panel-left{display:flex;align-items:center;gap:6px;min-width:0}
.panel-id{font-size:9px;color:var(--dim);letter-spacing:.1em}
.sep{color:var(--border)}
.panel-repo{font-size:10px;color:var(--purple);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.panel-repo:hover{opacity:.8}
.panel-status{font-size:9px;display:flex;align-items:center;gap:4px}
.panel-status .dot{width:5px;height:5px;border-radius:50%}
.panel-btns{display:flex;gap:6px}
.panel-btns button{background:none;border:none;color:var(--dim);font-size:9px;cursor:pointer;font-family:var(--font);padding:2px 4px}
.panel-btns button:hover{color:var(--purple)}
.panel-btns .stop-btn:hover{color:var(--red)}
.panel-body{flex:1;position:relative;min-height:0}
.panel-body iframe{width:100%;height:100%;border:0;background:#000}
.panel-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
.panel-num{font-family:system-ui,sans-serif;font-size:48px;font-weight:800;color:var(--border);line-height:1}
.panel-hint{font-size:9px;color:var(--border);letter-spacing:.25em;margin-top:6px}
.panel-loading{position:absolute;inset:0;background:var(--header);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3}
.panel-loading .spinner{display:flex;gap:4px}
.panel-loading .spinner i{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:blink .9s ease-in-out infinite}
.panel-loading .spinner i:nth-child(2){animation-delay:.15s}
.panel-loading .spinner i:nth-child(3){animation-delay:.3s}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.panel-loading .msg{font-size:9px;color:var(--muted);margin-top:8px}
.bottom-bar{padding:3px 16px;border-top:1px solid var(--border);font-size:8px;color:var(--border);letter-spacing:.15em;flex-shrink:0;display:flex;justify-content:space-between}

.lang-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--header);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 0 60px rgba(0,229,255,.06)}
.modal-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:11px;letter-spacing:.15em}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px}
.modal-close:hover{color:var(--red)}

.pd-overlay.open{align-items:flex-start;justify-content:flex-start}
.pd-modal{width:420px;max-height:85vh;display:flex;flex-direction:column;margin:40px 0 0 16px;box-shadow:0 0 60px rgba(0,229,255,.08)}
.pd-head{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-start;gap:10px}
.pd-title{flex:1;min-width:0}
.pd-name{font-size:13px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pd-type{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.05em}
.pd-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px;line-height:1;flex-shrink:0}
.pd-close:hover{color:var(--red)}
.pd-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.pd-pct-bar{display:flex;align-items:center;gap:8px}
.pd-pct-num{font-size:22px;font-weight:700;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.pd-pct-track{flex:1;height:4px;background:var(--border);border-radius:3px;overflow:hidden}
.pd-pct-fill{height:100%;border-radius:3px;transition:width .5s}
.pd-status{font-size:9px;letter-spacing:.1em;margin-top:4px;opacity:.8}
.pd-section{display:flex;flex-direction:column;gap:4px}
.pd-section-title{font-size:8px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.pd-section-val{font-size:10px;color:var(--text);line-height:1.6}
.pd-tags{display:flex;flex-wrap:wrap;gap:4px}
.pd-tag{font-size:8px;padding:2px 7px;border-radius:3px;border:1px solid var(--border);color:var(--muted)}
.pd-list{display:flex;flex-direction:column;gap:3px}
.pd-list-item{font-size:9px;color:var(--text);display:flex;gap:5px;align-items:flex-start;line-height:1.5}
.pd-list-icon{flex-shrink:0;margin-top:1px}
.pd-footer{padding:10px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px}
.pd-btn{flex:1;padding:6px;border-radius:4px;border:1px solid rgba(161,139,250,.3);background:rgba(161,139,250,.08);color:var(--purple);font-size:9px;cursor:pointer;font-family:var(--font);letter-spacing:.05em;transition:all .1s}
.pd-btn:hover{background:rgba(161,139,250,.18)}
.pd-no-detail{font-size:10px;color:var(--muted);text-align:center;padding:20px 0}
.pd-ses-list{display:flex;flex-direction:column;gap:4px}
.pd-ses-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:4px;background:rgba(5,8,16,.4);border:1px solid rgba(26,37,64,.5)}
.pd-ses-item-title{flex:1;font-size:9px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pd-ses-item-time{font-size:8px;color:var(--muted);flex-shrink:0}
.pd-ses-resume{font-size:8px;padding:1px 8px;border-radius:3px;border:1px solid rgba(0,229,255,.25);background:rgba(0,229,255,.06);color:var(--cyan);cursor:pointer;font-family:var(--font);flex-shrink:0}

.ov-modal{width:520px;max-height:82vh;display:flex;flex-direction:column}
.ov-list{flex:1;overflow-y:auto;padding:8px 0}
.ov-row{display:flex;align-items:center;gap:8px;padding:5px 16px;border-bottom:1px solid rgba(26,37,64,.3)}
.ov-row:last-child{border-bottom:none}
.ov-row-name{font-size:10px;color:var(--text);min-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-row-bar-wrap{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.ov-row-bar-fill{height:100%;border-radius:2px}
.ov-row-pct{font-size:9px;font-weight:600;min-width:34px;text-align:right}

.rw-modal{width:640px;max-height:84vh;display:flex;flex-direction:column}
.rw-filter{padding:8px 16px;border-bottom:1px solid rgba(26,37,64,.4);flex-shrink:0;display:flex;gap:6px}
.rw-filter input{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:10px;padding:4px 8px;outline:none;font-family:var(--font)}
.rw-filter input:focus{border-color:rgba(0,229,255,.35)}
.rw-list{flex:1;overflow-y:auto}
.rw-item{padding:9px 16px;border-bottom:1px solid rgba(26,37,64,.25);cursor:pointer;transition:background .08s;display:flex;align-items:flex-start;gap:10px}
.rw-item:hover{background:rgba(0,229,255,.03)}
.rw-item-icon{font-size:11px;flex-shrink:0;margin-top:1px;opacity:.7}
.rw-item-body{flex:1;min-width:0}
.rw-item-title{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.rw-item-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.rw-item-dir{font-size:8px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.rw-item-time{font-size:8px;color:var(--dim);flex-shrink:0}
.rw-item-stats{font-size:8px;color:var(--dim);flex-shrink:0}
.rw-item-actions{display:flex;gap:5px;flex-shrink:0;margin-top:2px}
.rw-resume-btn{font-size:8px;padding:2px 9px;border-radius:3px;border:1px solid rgba(0,229,255,.3);background:rgba(0,229,255,.07);color:var(--cyan);cursor:pointer;font-family:var(--font);transition:all .1s;white-space:nowrap}
.rw-resume-btn:hover{background:rgba(0,229,255,.18)}
.rw-empty{padding:40px;text-align:center;font-size:10px;color:var(--muted)}
.rw-group-label{padding:5px 16px;font-size:8px;letter-spacing:.15em;color:var(--muted);background:rgba(0,0,0,.2);border-bottom:1px solid rgba(26,37,64,.4)}

.fb-modal{width:560px;max-height:78vh;display:flex;flex-direction:column}
.fb-title-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.fb-title{font-family:system-ui,sans-serif;font-size:13px;font-weight:800;color:#E8EEFF;display:flex;align-items:center;gap:8px}
.fb-badge{font-size:8px;letter-spacing:.15em;color:rgba(161,139,250,.7);border:1px solid rgba(161,139,250,.2);padding:1px 6px;border-radius:3px}
.fb-drives{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.fb-drive{background:rgba(161,139,250,.06);border:1px solid rgba(161,139,250,.15);border-radius:5px;padding:5px 12px;font-size:10px;color:var(--purple);cursor:pointer;transition:all .1s;display:flex;align-items:center;gap:5px}
.fb-drive:hover{background:rgba(161,139,250,.14);border-color:rgba(161,139,250,.35)}
.fb-breadcrumb{padding:7px 16px;border-bottom:1px solid rgba(26,37,64,.5);font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;background:rgba(0,0,0,.2)}
.fb-list{flex:1;overflow-y:auto;padding:4px 0}
.fb-item{display:flex;align-items:center;gap:10px;padding:7px 16px;cursor:pointer;transition:background .08s;border-left:2px solid transparent}
.fb-item:hover{background:rgba(255,255,255,.03)}
.fb-item.is-git{border-left-color:rgba(16,240,144,.4)}
.fb-item.is-git:hover{background:rgba(16,240,144,.04)}
.fb-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.fb-name{flex:1;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb-git-badge{font-size:8px;color:var(--green);border:1px solid rgba(16,240,144,.25);padding:1px 5px;border-radius:3px;flex-shrink:0;letter-spacing:.1em}
.fb-open-btn{background:rgba(16,240,144,.08);border:1px solid rgba(16,240,144,.2);color:var(--green);font-size:8px;padding:2px 7px;border-radius:3px;cursor:pointer;flex-shrink:0;font-family:var(--font);transition:all .1s}
.fb-open-btn:hover{background:rgba(16,240,144,.18)}
.fb-empty{padding:40px;text-align:center;font-size:10px;color:var(--dim)}
.fb-loading{padding:30px;text-align:center;font-size:10px;color:var(--muted)}
.fb-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.fb-path-input{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:10px;color:var(--text);font-family:var(--font);outline:none}
.fb-path-input:focus{border-color:rgba(161,139,250,.35)}
.fb-select-btn{background:rgba(161,139,250,.1);border:1px solid rgba(161,139,250,.3);color:var(--purple);font-size:10px;padding:5px 14px;border-radius:4px;cursor:pointer;font-family:var(--font);font-weight:600;letter-spacing:.05em;transition:all .1s;white-space:nowrap}
.fb-select-btn:hover{background:rgba(161,139,250,.2)}

.pm-modal{width:580px;max-height:80vh;display:flex;flex-direction:column}
.pm-list{flex:1;overflow-y:auto;padding:8px 0}
.pm-item{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid rgba(26,37,64,.3)}
.pm-item-info{flex:1;min-width:0}
.pm-item-name{font-size:11px;color:var(--text);margin-bottom:2px}
.pm-item-desc{font-size:9px;color:var(--muted)}
.pm-item-ver{font-size:8px;color:var(--dim);margin-top:1px}
.pm-badge{font-size:7px;padding:1px 5px;border-radius:2px;border:1px solid;letter-spacing:.05em;flex-shrink:0}
.pm-badge.enabled{color:var(--green);border-color:rgba(16,240,144,.2)}
.pm-badge.disabled{color:var(--muted);border-color:var(--border)}
.pm-btn{font-size:8px;padding:2px 8px;border-radius:3px;cursor:pointer;font-family:var(--font);transition:all .1s;white-space:nowrap;flex-shrink:0}
.pm-toggle-btn{border:1px solid rgba(161,139,250,.2);background:rgba(161,139,250,.07);color:var(--purple)}
.pm-toggle-btn:hover{background:rgba(161,139,250,.18)}
.pm-remove-btn{border:1px solid rgba(255,51,102,.2);background:rgba(255,51,102,.06);color:var(--red);margin-left:4px}
.pm-remove-btn:hover{background:rgba(255,51,102,.18)}
.pm-install-row{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px}
.pm-url-input{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:10px;color:var(--text);font-family:var(--font);outline:none}
.pm-url-input:focus{border-color:rgba(0,229,255,.35)}
.pm-url-input::placeholder{color:var(--dim)}
.pm-install-btn{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);color:var(--cyan);font-size:10px;padding:5px 14px;border-radius:4px;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .1s}
.pm-install-btn:hover{background:rgba(0,229,255,.18)}
.pm-install-btn:disabled{opacity:.4;cursor:not-allowed}

.plugin-panels{flex:1;overflow:hidden;display:flex;flex-direction:column}
.plugin-panel-section{padding:6px;flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px;overflow-y:auto}
.plugin-widget{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column}
.plugin-widget-head{padding:5px 10px;background:var(--header);border-bottom:1px solid var(--border);font-size:9px;color:var(--purple);letter-spacing:.1em;display:flex;align-items:center;gap:6px}
.plugin-widget-body{flex:1;padding:8px;overflow:auto;font-size:10px}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-collapse-strip">
      <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="펼치기">▶</button>
    </div>
    <div class="sidebar-header">
      <div class="sidebar-title">
        <div class="dot"></div>
        <span>GitHub Repos</span>
        <button class="refresh-btn" onclick="openOv()" title="개발현황">📊</button>
        <button class="refresh-btn" onclick="refreshRepos()" title="새로고침">↻</button>
        <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="사이드바 접기">◀</button>
      </div>
      <input class="search" id="repoSearch" placeholder="Search repos...">
    </div>
    <div class="token-setup" id="tokenSetup" style="display:none">
      <div class="token-setup-title">⚠ GITHUB TOKEN 필요</div>
      <div class="token-setup-desc">Personal Access Token이 필요합니다.<br>
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=sisyphus-dashboard" target="_blank">→ 토큰 생성 (repo 권한)</a>
      </div>
      <input class="token-input" id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxx">
      <button class="token-save-btn" id="tokenSaveBtn" onclick="saveToken()">토큰 저장 &amp; 연결</button>
    </div>
    <div class="repo-list" id="repoList">
      <div class="skel-item"><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line tiny"></div></div>
      <div class="skel-item"><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line tiny"></div></div>
      <div class="skel-item"><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line tiny"></div></div>
      <div class="skel-item"><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line tiny"></div></div>
      <div class="skel-item"><div class="skel-line"></div><div class="skel-line short"></div></div>
    </div>
    <div class="sidebar-footer">
      <span id="repoCount">로딩 중...</span>
      <span id="repoSource" style="color:var(--purple)">GITHUB</span>
    </div>
  </div>

  <div class="main">
    <div class="top-bar">
      <div class="brand">
        <h1>SISYPHUS</h1>
        <span class="badge">DESKTOP</span>
        <div class="status-indicator"><div class="live-dot"></div>OPENCODE READY</div>
      </div>
      <div class="top-right">
        <button class="top-btn" onclick="openRecentWork()" title="최근 작업">⚡ 최근 작업</button>
        <button class="top-btn purple" onclick="openPluginManager()" title="플러그인">🔌 플러그인</button>
        <span>PANELS <span id="activeCount" style="color:var(--purple)">0</span>/4</span>
        <span class="clock" id="clock"></span>
      </div>
    </div>

    <div class="assign-bar" id="assignBar">
      <span>● 사이드바에서 레포 선택 → PANEL-<span id="assignTarget"></span></span>
      <span class="cancel" onclick="cancelAssign()">CANCEL</span>
    </div>

    <div class="panels" id="panels"></div>
    <div id="pluginPanelsContainer" style="display:none;flex:1;overflow:hidden"></div>

    <div class="bottom-bar">
      <span id="bottomLeft">SISYPHUS v1.0 · DESKTOP · ELECTRON</span>
      <span>OHMYCODE · WINDOWS</span>
    </div>
  </div>
</div>

<!-- Project Detail Modal -->
<div class="overlay pd-overlay" id="pdOverlay" onclick="pdBgClose(event)">
  <div class="modal pd-modal" onclick="event.stopPropagation()">
    <div class="pd-head">
      <div class="pd-title"><div class="pd-name" id="pdName"></div><div class="pd-type" id="pdType"></div></div>
      <button class="pd-close" onclick="closePd()">✕</button>
    </div>
    <div class="pd-body" id="pdBody"></div>
    <div class="pd-footer" id="pdFooter">
      <button class="pd-btn" onclick="closePd()" style="background:none;color:var(--muted);border-color:var(--border)">닫기</button>
    </div>
  </div>
</div>

<!-- Overview Modal -->
<div class="overlay" id="ovOverlay" onclick="if(event.target===this)closeOv()">
  <div class="modal ov-modal" onclick="event.stopPropagation()">
    <div class="modal-head"><span class="modal-title" style="color:var(--purple)">📊 개발현황 개요</span><button class="modal-close" onclick="closeOv()">✕</button></div>
    <div class="ov-list" id="ovList"></div>
  </div>
</div>

<!-- Recent Work Modal -->
<div class="overlay" id="rwOverlay" onclick="if(event.target===this)closeRecentWork()">
  <div class="modal rw-modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-title" style="color:var(--cyan)">⚡ 최근 작업 세션 <span id="rwCount" style="color:var(--muted);font-weight:400"></span></span>
      <button class="modal-close" onclick="closeRecentWork()">✕</button>
    </div>
    <div class="rw-filter"><input id="rwSearch" placeholder="레포명 또는 작업 내용 검색..." oninput="renderRwList()"></div>
    <div class="rw-list" id="rwList"></div>
  </div>
</div>

<!-- File Browser Modal -->
<div class="overlay" id="fbOverlay" onclick="if(event.target===this)closeFb()">
  <div class="modal fb-modal" onclick="event.stopPropagation()">
    <div class="fb-title-bar">
      <div class="fb-title">📁 폴더 선택 <span class="fb-badge">FILE BROWSER</span></div>
      <button class="modal-close" onclick="closeFb()">✕</button>
    </div>
    <div class="fb-drives" id="fbDrives"></div>
    <div class="fb-breadcrumb" id="fbBreadcrumb">/mnt</div>
    <div class="fb-list" id="fbList"></div>
    <div class="fb-footer">
      <input class="fb-path-input" id="fbPathInput" placeholder="/mnt/c/my-project">
      <button class="fb-select-btn" onclick="fbConfirmSelect()">이 폴더로 실행 ▶</button>
    </div>
  </div>
</div>

<!-- Plugin Manager Modal -->
<div class="overlay" id="pmOverlay" onclick="if(event.target===this)closePm()">
  <div class="modal pm-modal" onclick="event.stopPropagation()">
    <div class="modal-head"><span class="modal-title" style="color:var(--purple)">🔌 플러그인 관리</span><button class="modal-close" onclick="closePm()">✕</button></div>
    <div class="pm-list" id="pmList"><div style="padding:30px;text-align:center;font-size:10px;color:var(--muted)">로딩 중...</div></div>
    <div class="pm-install-row">
      <input class="pm-url-input" id="pmUrlInput" placeholder="https://github.com/user/sisyphus-plugin-name" oninput="this.value=this.value.trim()">
      <button class="pm-install-btn" id="pmInstallBtn" onclick="installPlugin()">GitHub 설치</button>
    </div>
  </div>
</div>

<script>
const LANG_COLORS={JavaScript:'#F7DF1E',TypeScript:'#3178C6',Python:'#3776AB',Go:'#00ADD8',Rust:'#CE422B',Java:'#ED8B00','C++':'#F34B7D',C:'#555555',Ruby:'#CC342D',Swift:'#FA7343',Kotlin:'#7F52FF',PHP:'#777BB4',CSS:'#563D7C',HTML:'#E44D26',Shell:'#89E051',Vue:'#4FC08D',Dart:'#00B4AB'};

const state={
  repos:[],panels:[null,null,null,null],panelMode:['idle','idle','idle','idle'],
  assigningPanel:null,cloning:{},hasToken:false,filter:'',progress:{},
  panelTs:{},activeView:'panels',
};

const cache={config:null,configTs:0};
const CONFIG_TTL=10000;

function $(id){return document.getElementById(id)}

function devStatus(pct){
  if(pct===null)return['','var(--muted)'];
  if(pct===100)return['완전 완성','var(--green)'];
  if(pct>=90)return['코드 완성','var(--green)'];
  if(pct>=70)return['핵심 완성','var(--cyan)'];
  if(pct>=40)return['개발 중','var(--amber)'];
  if(pct>0)return['초기 단계','var(--red)'];
  return['미파악','var(--muted)'];
}

function timeAgo(d){
  if(!d)return'';
  const diff=Date.now()-new Date(d).getTime();
  const days=Math.floor(diff/86400000);
  if(days===0)return'today';if(days===1)return'1d ago';
  if(days<30)return days+'d ago';if(days<365)return Math.floor(days/30)+'mo ago';
  return Math.floor(days/365)+'y ago';
}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

async function checkConfig(){
  try{
    if(cache.config&&Date.now()-cache.configTs<CONFIG_TTL){
      applyConfig(cache.config);return;
    }
    const r=await fetch('/api/config');
    const d=await r.json();
    cache.config=d;cache.configTs=Date.now();
    applyConfig(d);
    applyPluginInjections(d.pluginInjections||[]);
  }catch{}
}

function applyConfig(d){
  state.hasToken=d.hasToken;
  if(d.wslHome) wslHome=d.wslHome;
  if(!d.hasToken){
    $('tokenSetup').style.display='flex';
    $('tokenSetup').style.flexDirection='column';
  }else{
    $('tokenSetup').style.display='none';
    loadRepos();
  }
}

function applyPluginInjections(injections){
  const container=$('pluginPanelsContainer');
  if(!injections||!injections.length){
    container.style.display='none';
    return;
  }
  let html='<div class="plugin-panel-section">';
  for(const inj of injections){
    const bodyHtml=inj.html||'';
    html+=`<div class="plugin-widget"><div class="plugin-widget-head">🔌 ${esc(inj.name||inj.id)}</div><div class="plugin-widget-body" id="pw-${esc(inj.id)}">${bodyHtml}</div></div>`;
  }
  html+='</div>';
  container.innerHTML=html;
  for(const inj of injections){
    if(inj.js){
      try{
        const fn=new Function('el',inj.js);
        const el=$('pw-'+inj.id);
        if(el)fn(el);
      }catch(e){console.error('[plugin-ui:'+inj.id+']',e);}
    }
  }
  if(injections.length>0)container.style.display='block';
}

async function saveToken(){
  const token=$('tokenInput').value.trim();
  if(!token){alert('토큰을 입력하세요');return}
  $('tokenSaveBtn').disabled=true;$('tokenSaveBtn').textContent='저장 중...';
  try{
    const r=await fetch('/api/config/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
    const d=await r.json();
    if(d.ok){$('tokenSetup').style.display='none';state.hasToken=true;cache.config=null;loadRepos();}
    else alert('오류: '+(d.error||'저장 실패'));
  }catch(e){alert('오류: '+e.message);}
  finally{$('tokenSaveBtn').disabled=false;$('tokenSaveBtn').textContent='토큰 저장 & 연결';}
}

async function loadProgress(){
  try{const r=await fetch('/api/progress');state.progress=await r.json();}catch{}
}

async function loadRepos(q){
  if(!state.hasToken)return;
  try{
    const url='/api/github/repos'+(q?'?q='+encodeURIComponent(q):'');
    const r=await fetch(url);
    const d=await r.json();
    if(d.error==='NO_TOKEN'){$('tokenSetup').style.display='flex';return}
    if(d.error){console.error(d.error);return}
    if(!d.cached)await loadProgress();
    state.repos=d.repos;
    renderRepos();
  }catch(e){console.error(e);}
}

async function refreshRepos(){
  if(!state.hasToken){checkConfig();return}
  $('repoCount').textContent='로딩 중...';
  try{
    const r=await fetch('/api/github/repos?refresh=1');
    const d=await r.json();
    if(d.repos){state.repos=d.repos;renderRepos();}
  }catch{}
}

function getFilteredRepos(){
  const q=state.filter.toLowerCase();
  let repos=q?state.repos.filter(r=>r.name.toLowerCase().includes(q)||(r.description||'').toLowerCase().includes(q)||(r.language||'').toLowerCase().includes(q)):[...state.repos];
  repos.sort((a,b)=>(state.progress[b.name]??-1)-(state.progress[a.name]??-1));
  return repos;
}

function renderRepos(){
  const list=$('repoList');
  const repos=getFilteredRepos();
  $('repoCount').textContent=repos.length+' / '+state.repos.length+' repos';
  if(!repos.length){list.innerHTML='<div style="padding:20px;text-align:center;font-size:10px;color:var(--dim)">레포 없음</div>';return}
  const frag=document.createDocumentFragment();
  const tmpl=document.createElement('template');
  const html=repos.map((r,i)=>{
    const inPanel=state.panels.some(p=>p?.name===r.name);
    const cl=state.cloning[r.name];
    const isCloning=cl&&cl.status==='cloning';
    const lc=LANG_COLORS[r.language]||'#4B5A7A';
    const devPct=state.progress[r.name]??null;
    const fillColor=devPct===null?'':devPct>=80?'var(--green)':devPct>=40?'var(--amber)':'var(--red)';
    const[statusText,statusColor]=devStatus(devPct);
    const devBar=devPct!==null?`<div class="dev-progress"><div class="dev-progress-label"><span class="dev-progress-tag">DEV</span><span class="dev-progress-pct" style="color:${fillColor}">${devPct}%</span></div><div class="dev-progress-track"><div class="dev-progress-fill" style="width:${devPct}%;background:${fillColor}"></div></div><span class="dev-status-label" style="color:${statusColor}">${statusText}</span></div>`:'';
    const cloneOverlay=isCloning?`<div class="clone-overlay"><div style="font-size:9px;color:var(--cyan)">CLONING ${cl.progress||0}%</div><div class="clone-bar-wrap"><div class="clone-bar" style="width:${cl.progress||0}%"></div></div><div class="clone-msg">${esc(cl.msg||'Cloning...')}</div></div>`:'';
    return`<div class="repo-item${inPanel?' in-panel':''}" onclick="selectRepo(${i})" data-repo="${esc(r.name)}">${cloneOverlay}<div class="repo-item-top"><span class="repo-name" title="${esc(r.fullName)}">${esc(r.name)}</span>${r.private?'<span class="repo-private">PRIVATE</span>':''}</div><div class="repo-item-meta">${r.language?`<span class="repo-lang"><span class="lang-dot" style="background:${lc}"></span>${esc(r.language)}</span>`:''} ${r.stars?`<span class="repo-stars">★ ${r.stars}</span>`:''} ${r.cloned?'<span class="repo-cloned-badge">CLONED</span>':''}<span class="repo-time">${timeAgo(r.pushedAt)}</span></div>${devBar}</div>`;
  }).join('');
  tmpl.innerHTML=html;
  list.replaceChildren(tmpl.content);
}

function updateCloneProgress(repoName,pd){
  const card=document.querySelector(`[data-repo="${repoName}"]`);
  if(!card){renderRepos();return}
  const bar=card.querySelector('.clone-bar');
  const msg=card.querySelector('.clone-msg');
  const pct=card.querySelector('.clone-overlay div');
  if(bar)bar.style.width=(pd.progress||0)+'%';
  if(msg)msg.textContent=pd.msg||'';
  if(pct)pct.textContent='CLONING '+(pd.progress||0)+'%';
}

async function selectRepo(idx){
  const repos=getFilteredRepos();
  const repo=repos[idx];
  if(!repo)return;
  if(state.assigningPanel!==null){await cloneAndAssign(state.assigningPanel,repo);cancelAssign();}
  else showRepoDetail(repo);
}

let pdSessions=[];

async function showRepoDetail(repo){
  $('pdName').textContent=repo.name;
  $('pdType').textContent='';
  $('pdBody').innerHTML='<div class="pd-no-detail" style="color:var(--muted)">로딩 중...</div>';
  $('pdOverlay').classList.add('open');
  const pct=state.progress[repo.name]??0;
  const fillColor=pct>=80?'var(--green)':pct>=40?'var(--amber)':'var(--red)';
  const[statusText]=devStatus(pct);
  try{
    const[dr,sr]=await Promise.all([
      fetch('/api/project-detail?repo='+encodeURIComponent(repo.name)).then(r=>r.json()),
      fetch('/api/opencode/sessions?dir='+encodeURIComponent(repo.fullPath||'')).then(r=>r.json()).catch(()=>[]),
    ]);
    if(dr.type)$('pdType').textContent=dr.type;
    let html=`<div class="pd-pct-bar"><span class="pd-pct-num" style="color:${fillColor}">${pct}%</span><div class="pd-pct-track"><div class="pd-pct-fill" style="width:${pct}%;background:${fillColor}"></div></div></div><div class="pd-status" style="color:${fillColor}">${statusText}</div>`;
    if(dr.purpose)html+=`<div class="pd-section"><div class="pd-section-title">목적</div><div class="pd-section-val">${esc(dr.purpose)}</div></div>`;
    if(dr.tech?.length)html+=`<div class="pd-section"><div class="pd-section-title">기술스택</div><div class="pd-tags">${dr.tech.map(t=>`<span class="pd-tag">${esc(t)}</span>`).join('')}</div></div>`;
    if(dr.done?.length)html+=`<div class="pd-section"><div class="pd-section-title">완료</div><div class="pd-list">${dr.done.map(t=>`<div class="pd-list-item"><span class="pd-list-icon" style="color:var(--green)">✅</span>${esc(t)}</div>`).join('')}</div></div>`;
    if(dr.todo?.length)html+=`<div class="pd-section"><div class="pd-section-title">남은 작업</div><div class="pd-list">${dr.todo.map(t=>`<div class="pd-list-item"><span class="pd-list-icon" style="color:var(--amber)">□</span>${esc(t)}</div>`).join('')}</div></div>`;
    if(dr.updated)html+=`<div style="font-size:8px;color:var(--muted);margin-top:4px">최종 업데이트: ${esc(dr.updated)}${dr.eta?' · 예상 작업: '+esc(dr.eta):''}</div>`;
    if(!dr.hasDetail)html+='<div class="pd-no-detail">프로젝트_개요.txt 없음</div>';
    if(sr&&sr.length){
      pdSessions=sr.slice(0,8);
      html+=`<div class="pd-section"><div class="pd-section-title">최근 작업 세션 (${sr.length})</div><div class="pd-ses-list">${pdSessions.map((s,idx)=>{const dt=s.time_updated?new Date(s.time_updated).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'';return`<div class="pd-ses-item"><span class="pd-ses-item-title" title="${esc(s.title||'')}">${esc(s.title||'(제목 없음)')}</span><span class="pd-ses-item-time">${dt}</span><button class="pd-ses-resume" onclick="pdResumeByIdx(${idx})">▶</button></div>`}).join('')}</div></div>`;
    }
    $('pdBody').innerHTML=html;
  }catch{$('pdBody').innerHTML='<div class="pd-no-detail">불러오기 실패</div>';}
  const footer=$('pdFooter');
  footer.querySelectorAll('.pd-panel-btn').forEach(b=>b.remove());
  const emptyPanel=[0,1,2,3].findIndex(i=>!state.panels[i]);
  const btn=document.createElement('button');
  btn.className='pd-btn pd-panel-btn';
  if(emptyPanel===-1){btn.textContent='패널 모두 사용 중';btn.disabled=true;btn.style.opacity='.4';}
  else{btn.textContent=`▶ P${emptyPanel+1}에 배치`;btn.onclick=async()=>{closePd();await cloneAndAssign(emptyPanel,repo);};}
  footer.insertBefore(btn,footer.querySelector('button'));
}

function pdResumeByIdx(idx){if(pdSessions[idx]){closePd();rwResume(pdSessions[idx]);}}
function closePd(){$('pdOverlay').classList.remove('open')}
function pdBgClose(e){if(e.target===$('pdOverlay'))closePd()}

function openOv(){
  const repos=[...state.repos].sort((a,b)=>(state.progress[b.name]??-1)-(state.progress[a.name]??-1));
  $('ovList').innerHTML=repos.map(r=>{const pct=state.progress[r.name]??0;const c=pct>=80?'var(--green)':pct>=40?'var(--amber)':pct>0?'var(--red)':'var(--border)';return`<div class="ov-row"><span class="ov-row-name">${esc(r.name)}</span><div class="ov-row-bar-wrap"><div class="ov-row-bar-fill" style="width:${pct}%;background:${c}"></div></div><span class="ov-row-pct" style="color:${c}">${pct>0?pct+'%':'-'}</span></div>`}).join('');
  $('ovOverlay').classList.add('open');
}
function closeOv(){$('ovOverlay').classList.remove('open')}

let rwAllSessions=[],rwFilteredFlat=[];

async function openRecentWork(){
  $('rwSearch').value='';
  $('rwList').innerHTML='<div class="rw-empty">불러오는 중...</div>';
  $('rwOverlay').classList.add('open');
  try{
    const r=await fetch('/api/opencode/sessions?dir=');
    rwAllSessions=await r.json();
    $('rwCount').textContent=`(${rwAllSessions.length})`;
    renderRwList();
  }catch{$('rwList').innerHTML='<div class="rw-empty">불러오기 실패</div>';}
}

function renderRwList(){
  const q=($('rwSearch').value||'').toLowerCase();
  const filtered=q?rwAllSessions.filter(s=>(s.title||'').toLowerCase().includes(q)||(s.directory||'').toLowerCase().includes(q)):rwAllSessions;
  if(!filtered.length){$('rwList').innerHTML='<div class="rw-empty">세션 없음</div>';return}
  const groups={};
  for(const s of filtered){const dir=s.directory||'global';const key=dir.split('/').pop()||dir;if(!groups[key])groups[key]={dir,sessions:[]};groups[key].sessions.push(s);}
  rwFilteredFlat=[];let html='';
  for(const[name,g]of Object.entries(groups)){
    html+=`<div class="rw-group-label">📁 ${esc(name)}</div>`;
    for(const s of g.sessions){
      const fi=rwFilteredFlat.length;rwFilteredFlat.push(s);
      const dt=s.time_updated?new Date(s.time_updated).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
      const stats=[s.msg_count&&`💬 ${s.msg_count}`,s.summary_files&&`📝 ${s.summary_files}개 파일`].filter(Boolean).join(' · ');
      html+=`<div class="rw-item"><div class="rw-item-icon">⚡</div><div class="rw-item-body"><div class="rw-item-title">${esc(s.title||'(제목 없음)')}</div><div class="rw-item-meta"><span class="rw-item-dir">${esc(s.directory||'')}</span><span class="rw-item-time">${dt}</span>${stats?`<span class="rw-item-stats">${stats}</span>`:''}</div></div><div class="rw-item-actions"><button class="rw-resume-btn" onclick="rwResumeByIdx(${fi})">▶ 재개</button></div></div>`;
    }
  }
  $('rwList').innerHTML=html;
}

function rwResumeByIdx(idx){if(rwFilteredFlat[idx]){closeRecentWork();rwResume(rwFilteredFlat[idx]);}}

async function rwResume(session){
  const pi=[0,1,2,3].findIndex(i=>!state.panels[i]);
  const panelIdx=pi===-1?0:pi;
  const repoPath=session.directory||'';
  const repoName=repoPath.split('/').pop()||'session';
  const repo={name:repoName,fullPath:repoPath,mtime:new Date(session.time_updated||Date.now()).toISOString()};
  state.panels[panelIdx]=repo;state.panelMode[panelIdx]='launching';
  renderPanels();renderRepos();
  try{
    await fetch('/api/panel/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({panelId:panelIdx+1,repoDir:repoPath,sessionId:session.id})});
    await fetch('/api/panel/ready?panelId='+(panelIdx+1)).then(r=>r.json());
    state.panelTs[panelIdx]=Date.now();
    state.panelMode[panelIdx]='opencode';
  }catch{state.panelMode[panelIdx]='idle';}
  renderPanels();renderRepos();
}

function closeRecentWork(){$('rwOverlay').classList.remove('open')}

async function cloneAndAssign(panelIdx,ghRepo){
  if(ghRepo.cloned){
    const r=await fetch('/api/github/clone/progress?repo='+encodeURIComponent(ghRepo.name));
    const d=await r.json();
    if(d.localPath){assignRepo(panelIdx,{name:ghRepo.name,fullPath:d.localPath,mtime:ghRepo.pushedAt});return}
  }
  state.cloning[ghRepo.name]={status:'cloning',progress:0};renderRepos();
  try{
    const r=await fetch('/api/github/clone',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({repoName:ghRepo.name,cloneUrl:ghRepo.cloneUrl})});
    const d=await r.json();
    if(d.alreadyCloned){delete state.cloning[ghRepo.name];ghRepo.cloned=true;renderRepos();assignRepo(panelIdx,{name:ghRepo.name,fullPath:d.localPath,mtime:ghRepo.pushedAt});return}
    if(d.cloning){
      await new Promise(res=>pollCloneProgress(ghRepo.name,res));
      const prog=state.cloning[ghRepo.name];
      if(prog?.status==='error'){alert('Clone 실패: '+(prog.msg||'unknown'));delete state.cloning[ghRepo.name];renderRepos();return}
      delete state.cloning[ghRepo.name];ghRepo.cloned=true;renderRepos();
      assignRepo(panelIdx,{name:ghRepo.name,fullPath:d.localPath,mtime:ghRepo.pushedAt});
    }
  }catch(e){alert('오류: '+e.message);delete state.cloning[ghRepo.name];renderRepos();}
}

function pollCloneProgress(repoName,resolve){
  const es=new EventSource('/api/github/clone/progress/stream?repo='+encodeURIComponent(repoName));
  es.onmessage=e=>{const d=JSON.parse(e.data);state.cloning[repoName]=d;if(d.done||d.status==='error'){es.close();renderRepos();resolve(d);}else updateCloneProgress(repoName,d);};
  es.onerror=()=>{es.close();resolve({done:true,status:'error'});};
}

function requestAssign(pi){state.assigningPanel=pi;$('assignTarget').textContent=pi+1;$('assignBar').classList.add('show');}
function cancelAssign(){state.assigningPanel=null;$('assignBar').classList.remove('show');}

async function assignRepo(panelIdx,repo){
  state.panels[panelIdx]=repo;state.panelMode[panelIdx]='launching';
  renderPanels();renderRepos();
  try{
    await fetch('/api/panel/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({panelId:panelIdx+1,repoDir:repo.fullPath})});
    await fetch('/api/panel/ready?panelId='+(panelIdx+1)).then(r=>r.json());
    state.panelTs[panelIdx]=Date.now();
    state.panelMode[panelIdx]='opencode';
  }catch{state.panelMode[panelIdx]='idle';}
  renderPanels();
}

async function stopPanel(pi){
  state.panels[pi]=null;state.panelMode[pi]='idle';
  try{await fetch('/api/panel/stop',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({panelId:pi+1})});}catch{}
  renderPanels();renderRepos();
}

function reloadPanel(pi){const f=document.getElementById('panel-iframe-'+pi);if(f)f.src='/terminal/'+(pi+1)+'/?t='+Date.now();}

function closeRepo(pi){state.panels[pi]=null;renderPanels();renderRepos();}

function ensurePanels(){
  const c=$('panels');
  for(let i=0;i<4;i++){
    if(document.getElementById('panel-'+i))continue;
    const div=document.createElement('div');
    div.id='panel-'+i;div.className='panel';div.dataset.mode='init';
    div.innerHTML=`<div class="panel-bar" id="panel-bar-${i}"></div><div class="panel-body" id="panel-body-${i}"><iframe id="panel-iframe-${i}" src="about:blank" style="visibility:hidden" allow="clipboard-read;clipboard-write" allowfullscreen></iframe></div>`;
    c.appendChild(div);
  }
}

function buildBarHtml(i,repo,mode,isActive){
  let right='';
  if(isActive)right=`<div class="panel-btns"><button onclick="reloadPanel(${i})" title="새로고침">↻</button><button class="stop-btn" onclick="stopPanel(${i})" title="세션 종료">STOP</button><button onclick="closeRepo(${i})" title="레포 닫기" style="color:var(--red);font-size:11px;opacity:.7">✕</button></div>`;
  else if(mode!=='launching')right=`<div class="panel-btns"><button onclick="launchNow(${i})" style="color:var(--purple);border:1px solid rgba(161,139,250,.2);padding:2px 7px;border-radius:3px;font-size:9px">▶ RUN</button></div>`;
  let repoLabel='';
  if(repo&&isActive)repoLabel=`<div class="panel-status"><div class="dot" style="background:var(--green);box-shadow:0 0 4px var(--green)"></div><span style="color:var(--green)">OPENCODE</span></div><span class="sep">│</span><span class="panel-repo">${esc(repo.name)}</span>`;
  else if(mode==='launching')repoLabel='<span style="color:var(--amber);font-size:9px">LAUNCHING...</span>';
  else repoLabel=`<span class="panel-repo" onclick="requestAssign(${i})" style="color:var(--dim);cursor:pointer">+ 레포 선택</span>`;
  return`<div class="panel-left"><span class="panel-id">P${i+1}</span><span class="sep">│</span>${repoLabel}</div>${right}`;
}

function updatePanelBody(i,mode){
  const body=document.getElementById('panel-body-'+i);
  const iframe=document.getElementById('panel-iframe-'+i);
  body.querySelectorAll('.panel-empty,.panel-loading').forEach(el=>el.remove());
  if(mode==='idle'){
    const ov=document.createElement('div');ov.className='panel-empty';
    ov.innerHTML=`<div style="text-align:center"><div class="panel-num">${String(i+1).padStart(2,'0')}</div><div style="display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap"><button onclick="launchNow(${i})" style="background:rgba(161,139,250,.08);border:1px solid rgba(161,139,250,.2);color:var(--purple);font-size:10px;padding:5px 14px;border-radius:5px;cursor:pointer;font-family:var(--font);letter-spacing:.05em">▶ 바로 실행</button><button onclick="requestAssign(${i})" style="background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);font-size:10px;padding:5px 14px;border-radius:5px;cursor:pointer;font-family:var(--font)">📦 GitHub 레포</button><button onclick="openFb(${i})" style="background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);color:var(--cyan);font-size:10px;padding:5px 14px;border-radius:5px;cursor:pointer;font-family:var(--font)">📁 폴더 선택</button></div></div>`;
    body.insertBefore(ov,iframe);iframe.style.visibility='hidden';
  }else if(mode==='launching'){
    const ov=document.createElement('div');ov.className='panel-loading';
    ov.innerHTML='<div class="spinner"><i></i><i></i><i></i></div><div class="msg">Starting OpenCode...</div>';
    body.insertBefore(ov,iframe);iframe.style.visibility='hidden';
  }else if(mode==='opencode'){
    const ts=state.panelTs[i]||Date.now();
    iframe.src='/terminal/'+(i+1)+'/?t='+ts;
    iframe.style.visibility='visible';
    iframe.addEventListener('load',()=>{
      try{const b=iframe.contentDocument?.body?.innerText||'';if(b.includes('Press')&&b.includes('Reconnect'))iframe.src='/terminal/'+(i+1)+'/?t='+Date.now();}catch{}
    });
  }
}

function renderPanels(){
  ensurePanels();let cnt=0;
  for(let i=0;i<4;i++){
    const repo=state.panels[i],mode=state.panelMode[i],isActive=mode==='opencode';
    if(repo)cnt++;
    const pd=document.getElementById('panel-'+i);
    pd.className='panel'+(isActive?' active':'');
    document.getElementById('panel-bar-'+i).innerHTML=buildBarHtml(i,repo,mode,isActive);
    const prev=pd.dataset.mode;
    if(prev!==mode){updatePanelBody(i,mode);pd.dataset.mode=mode;}
    if(isActive)startReconnectMonitor(i);else clearReconnectMonitor(i);
  }
  $('activeCount').textContent=cnt;
}

async function launchNow(pi){
  const repo=state.panels[pi];
  const dir=repo?repo.fullPath:'';
  state.panels[pi]=repo||{name:'OpenCode',fullPath:'',mtime:new Date().toISOString()};
  state.panelMode[pi]='launching';renderPanels();
  try{
    const r=await fetch('/api/panel/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({panelId:pi+1,repoDir:dir})});
    const d=await r.json();if(!d.ok)throw new Error(d.error);
    await fetch('/api/panel/ready?panelId='+(pi+1)).then(r=>r.json());
    state.panelTs[pi]=Date.now();state.panelMode[pi]='opencode';
  }catch{state.panelMode[pi]='idle';}
  renderPanels();
}

let wslHome='';
function getDrives(){return[{label:'💾 C:',path:'/mnt/c'},{label:'💾 D:',path:'/mnt/d'},{label:'🏠 Home',path:wslHome||'/home'},{label:'📁 /mnt',path:'/mnt'}];}
const fb={panel:null,currentDir:'/mnt/c'};

function openFb(pi){fb.panel=pi;$('fbPathInput').value='';$('fbOverlay').classList.add('open');renderFbDrives();browseDir('/mnt/c');}
function closeFb(){$('fbOverlay').classList.remove('open');fb.panel=null;}
function renderFbDrives(){$('fbDrives').innerHTML=getDrives().map(d=>`<div class="fb-drive" onclick="browseDir('${d.path}')">${d.label}</div>`).join('');}

async function browseDir(dir){
  fb.currentDir=dir;$('fbPathInput').value=dir;
  $('fbBreadcrumb').textContent=dir.replace('/mnt/c','C:').replace('/mnt/d','D:').replace(wslHome||'/home','~');
  $('fbList').innerHTML='<div class="fb-loading">로딩 중...</div>';
  try{
    const r=await fetch('/api/browse?dir='+encodeURIComponent(dir));
    const data=await r.json();
    if(data.error){$('fbList').innerHTML=`<div class="fb-empty" style="color:var(--red)">${esc(data.error)}</div>`;return}
    let html='';
    if(data.parent)html+=`<div class="fb-item" onclick="browseDir('${esc(data.parent)}')"><span class="fb-icon">↩</span><span class="fb-name" style="color:var(--muted)">..</span></div>`;
    if(!data.items.length)html+='<div class="fb-empty">폴더가 비어 있습니다</div>';
    for(const it of data.items){
      const sp=it.fullPath.replace(/\\/g,'/').replace(/'/g,"\\'");
      html+=`<div class="fb-item${it.isGit?' is-git':''}" onclick="fbClickItem('${sp}',${it.isGit})"><span class="fb-icon">${it.isGit?'📦':'📁'}</span><span class="fb-name">${esc(it.name)}</span>${it.isGit?'<span class="fb-git-badge">GIT</span>':''} ${it.isGit?`<button class="fb-open-btn" onclick="event.stopPropagation();fbSelectPath('${sp}')">선택 ▶</button>`:''}</div>`;
    }
    $('fbList').innerHTML=html;
  }catch(e){$('fbList').innerHTML=`<div class="fb-empty" style="color:var(--red)">오류: ${esc(e.message)}</div>`;}
}

function fbClickItem(fp,isGit){$('fbPathInput').value=fp;if(!isGit)browseDir(fp);}
function fbSelectPath(fp){const repo={name:fp.split('/').pop(),fullPath:fp,mtime:new Date().toISOString()};const pi=fb.panel;closeFb();if(pi!==null)assignRepo(pi,repo);}
function fbConfirmSelect(){const p=$('fbPathInput').value.trim();if(p)fbSelectPath(p);}

async function openFbNative(pi){
  if(!window.electron){openFb(pi);return}
  const wslPath=await window.electron.openFolder();
  if(wslPath){const repo={name:wslPath.split('/').pop(),fullPath:wslPath,mtime:new Date().toISOString()};assignRepo(pi,repo);}
}

function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('collapsed');}

const reconnectTimers={};
function startReconnectMonitor(pi){
  clearReconnectMonitor(pi);
  reconnectTimers[pi]=setInterval(()=>{
    if(state.panelMode[pi]!=='opencode'){clearReconnectMonitor(pi);return}
    const iframe=document.getElementById('panel-iframe-'+pi);if(!iframe)return;
    try{const b=iframe.contentDocument?.body?.innerText||'';if(b.includes('Press')&&b.includes('Reconnect')){iframe.src='/terminal/'+(pi+1)+'/?t='+Date.now();}}catch{}
  },30000);
}
function clearReconnectMonitor(pi){if(reconnectTimers[pi]){clearInterval(reconnectTimers[pi]);delete reconnectTimers[pi];}}

async function healthCheckPanels(){
  for(let i=0;i<4;i++){
    if(state.panelMode[i]!=='opencode')continue;
    try{const r=await fetch('/terminal/'+(i+1)+'/',{method:'HEAD',signal:AbortSignal.timeout(2000)});if(!r.ok)throw'';}
    catch{const iframe=document.getElementById('panel-iframe-'+i);if(iframe&&!iframe.dataset.reconnecting){iframe.dataset.reconnecting='1';setTimeout(()=>{if(state.panelMode[i]==='opencode')iframe.src='/terminal/'+(i+1)+'/?t='+Date.now();delete iframe.dataset.reconnecting;},5000);}}
  }
}

async function openPluginManager(){
  $('pmOverlay').classList.add('open');
  await renderPluginList();
}
function closePm(){$('pmOverlay').classList.remove('open')}

async function renderPluginList(){
  try{
    const r=await fetch('/api/plugins');
    const plugins=await r.json();
    if(!plugins.length){$('pmList').innerHTML='<div style="padding:30px;text-align:center;font-size:10px;color:var(--muted)">설치된 플러그인 없음<br><span style="color:var(--dim)">GitHub URL로 설치하세요</span></div>';return}
    $('pmList').innerHTML=plugins.map(p=>`<div class="pm-item"><div class="pm-item-info"><div class="pm-item-name">${esc(p.name)}</div><div class="pm-item-desc">${esc(p.description)}</div><div class="pm-item-ver">v${esc(p.version)} ${p.author?'· '+esc(p.author):''}</div></div><span class="pm-badge ${p.enabled?'enabled':'disabled'}">${p.enabled?'ON':'OFF'}</span><button class="pm-btn pm-toggle-btn" onclick="togglePlugin('${esc(p.id)}')">${p.enabled?'비활성화':'활성화'}</button><button class="pm-btn pm-remove-btn" onclick="removePlugin('${esc(p.id)}')">삭제</button></div>`).join('');
  }catch{$('pmList').innerHTML='<div style="padding:30px;text-align:center;font-size:10px;color:var(--red)">불러오기 실패</div>';}
}

async function togglePlugin(id){
  try{await fetch('/api/plugins/install',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'toggle',id})}).catch(()=>{});await renderPluginList();location.reload();}catch{}
}

async function removePlugin(id){
  if(!confirm(`'${id}' 플러그인을 삭제하시겠습니까?`))return;
  if(window.electron){await window.electron.plugin.remove(id);}
  else{try{await fetch('/api/plugins/install',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'remove',id})});}catch{}}
  await renderPluginList();
}

async function installPlugin(){
  const url=$('pmUrlInput').value.trim();
  if(!url)return;
  $('pmInstallBtn').disabled=true;$('pmInstallBtn').textContent='설치 중...';
  try{
    const r=await fetch('/api/plugins/install',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const d=await r.json();
    if(d.ok){$('pmUrlInput').value='';await renderPluginList();setTimeout(()=>location.reload(),500);}
    else alert('설치 실패: '+(d.error||'unknown'));
  }catch(e){alert('오류: '+e.message);}
  finally{$('pmInstallBtn').disabled=false;$('pmInstallBtn').textContent='GitHub 설치';}
}

function updateClock(){$('clock').textContent=new Date().toLocaleTimeString('ko-KR',{hour12:false});}

let searchTimer;
$('repoSearch').addEventListener('input',e=>{
  state.filter=e.target.value;
  clearTimeout(searchTimer);
  searchTimer=setTimeout(renderRepos,150);
});
$('tokenInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveToken();});

if(window.electron){
  window.electron.on('open-plugin-manager',()=>openPluginManager());
}

setInterval(updateClock,1000);
setInterval(healthCheckPanels,10000);
updateClock();
renderPanels();

requestAnimationFrame(()=>{
  checkConfig();
  fetch('/api/config').then(r=>r.json()).then(d=>{
    if(d.hasToken)loadProgress().then(renderRepos);
  }).catch(()=>{});
});
</script>
